<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your KS Brand Store reset code</title>
  </head>
  <body style="margin:0;background:#000000;color:#fff8e7;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#000000;padding:32px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;border:1px solid rgba(228,180,90,0.35);border-radius:24px;background:#130e0d;overflow:hidden;">
            <tr>
              <td style="padding:30px 28px 18px 28px;text-align:center;">
                <div style="display:inline-block;border:1px solid #e4b45a;border-radius:999px;padding:10px 14px;color:#e4b45a;font-size:12px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;">
                  KS Brand Store
                </div>
                <h1 style="margin:24px 0 0 0;color:#fff8e7;font-size:30px;line-height:1.15;font-weight:900;">
                  Your reset code
                </h1>
                <p style="margin:14px auto 0 auto;max-width:420px;color:#d8c79f;font-size:15px;line-height:1.65;">
                  Use this one-time code to create a new password for your admin account.
                </p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:16px 28px 10px 28px;">
                <div style="display:inline-block;width:100%;max-width:320px;border:1px solid rgba(228,180,90,0.45);border-radius:18px;background:#000000;padding:18px 20px;text-align:center;">
                  <div style="color:#b8a98a;font-size:11px;font-weight:800;letter-spacing:0.18em;text-transform:uppercase;">
                    One-time code
                  </div>
                  <div style="margin-top:10px;color:#fdd97d;font-family:'Courier New',Courier,monospace;font-size:34px;font-weight:900;letter-spacing:0.22em;line-height:1;">
                    {{ .Token }}
                  </div>
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:14px 28px 28px 28px;">
                <p style="margin:0 auto;max-width:390px;color:#b8a98a;font-size:13px;line-height:1.6;text-align:center;">
                  Enter this code in the password reset screen. Do not share it with anyone.
                </p>
              </td>
            </tr>
            <tr>
              <td style="border-top:1px solid rgba(156,122,66,0.35);padding:20px 28px 26px 28px;">
                <p style="margin:0;color:#b8a98a;font-size:12px;line-height:1.6;text-align:center;">
                  If you did not request this code, you can safely ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
